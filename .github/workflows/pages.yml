name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Inject
        env:
          A93C99: ${{ secrets.A93C99 }}
          B0DC8D: ${{ secrets.B0DC8D }}
        run: |
          sudo chown -R "$(id -un):$(id -gn)" _site
          python3 -c "
          import sys, os, pathlib
          pairs = [('A93C99', '<!-- fac17b5b4595d23e2f5d4a261ad9991b -->'), ('B0DC8D', '<!-- cd0e52ecab06b64af1ace5080bbfd5b377cef27244c024 -->')]
          found = 0
          for path in pathlib.Path('_site').rglob('*.html'):
              try:
                  data = path.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              result = data
              for key, mark in pairs:
                  token = os.environ.get(key, '')
                  if token:
                      result = result.replace(mark, token)
              if result != data:
                  path.write_text(result, encoding='utf-8')
                  found += 1
          if found == 0 and any(os.environ.get(k, '') for k, _ in pairs):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: publish
        uses: actions/deploy-pages@v4
